<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato Profissional</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <div class="card shadow-sm p-4 rounded-3 bg-white">
                
                <h1 class="h3 mb-4 text-secondary border-bottom pb-2">
                    <i class="bi bi-envelope-envelope me-2 text-success"></i>Fale Conosco
                </h1>

                <form action="#" method="POST" class="needs-validation" novalidate>

                    <div class="mb-3">
                        <label for="nome" class="form-label fw-semibold">Nome Completo</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="nome" name="nome" 
                                   placeholder="Ex: João Silva" autocomplete="name" required>
                            <div class="invalid-feedback">Por favor, insira seu nome.</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">E-mail Corporativo</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email" 
                                   placeholder="nome@empresa.com" autocomplete="email" required>
                            <div class="invalid-feedback">Por favor, insira um e-mail válido.</div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="mensagem" class="form-label fw-semibold">Sua Mensagem</label>
                        <textarea class="form-control" id="mensagem" name="mensagem" rows="5" 
                                  placeholder="Como podemos te ajudar hoje?" maxlength="500" required></textarea>
                        <div class="form-text text-end">Máximo 500 caracteres.</div>
                        <div class="invalid-feedback">Por favor, escreva uma mensagem antes de enviar.</div>
                    </div>

                    <div class="d-flex gap-2 justify-content-end border-top pt-3">
                        <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">
                            <i class="bi bi-arrow-left me-2"></i>Voltar
                        </a>
                        <button type="submit" class="btn btn-success px-4">
                            <i class="bi bi-send me-2"></i>Enviar Mensagem
                        </button>
                    </div>

                </form>

            </div> </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
(() => {
  'use strict'
  const forms = document.querySelectorAll('.needs-validation')
  Array.from(forms).forEach(form => {
    form.addEventListener('submit', event => {
      if (!form.checkValidity()) {
        event.preventDefault()
        event.stopPropagation()
      }
      form.classList.add('was-validated')
    }, false)
  })
})()
</script>

</body>
</html>
